    <script>
      lucide.createIcons();

      // Script interactivo de simulación de toques
      document.querySelectorAll('.smart-card').forEach(card => {
          card.addEventListener('click', () => {
              card.classList.toggle('active');
              const statusTxt = card.querySelector('.dynamic-status');
              if(card.classList.contains('active')) {
                  statusTxt.innerText = 'Encendido';
              } else {
                  statusTxt.innerText = 'Apagado';
              }
          });
      });
